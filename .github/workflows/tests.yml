name: tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.5'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
            phpunit: '^12.5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd
          coverage: none
      - run: composer require --no-update illuminate/support:${{ matrix.laravel }} orchestra/testbench:${{ matrix.testbench }} phpunit/phpunit:${{ matrix.phpunit }}
      - run: composer update --prefer-dist --no-interaction
      - run: composer validate --strict
      - run: find src config routes tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: vendor/bin/phpunit
      - run: composer audit
